name: Test OCP Cluster Trigger

on:
  workflow_dispatch:   # manual trigger
  schedule:
    - cron: "0 2 * * *"   # nightly (2 AM UTC)

jobs:
  trigger-jenkins:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Jenkins Flexy-install job
        env:
          JENKINS_URL: https://jenkins-csb-openshift-qe-mastern.dno.corp.redhat.com
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
        run: |
          echo "Triggering Jenkins job..."

          RESPONSE=$(curl -i -X POST "$JENKINS_URL/job/ocp-common/job/Flexy-install/buildWithParameters" \
            --user "$JENKINS_USER:$JENKINS_TOKEN" \
            --data-urlencode "VARIABLES_LOCATION=dummy-template.yaml" \
            --data-urlencode "LAUNCHER_VARS=test_var: test_value" \
            --data-urlencode "INSTANCE_NAME_PREFIX=cam-src-${GITHUB_RUN_ID}" \
            --data-urlencode "JENKINS_AGENT_LABEL=oc417" \
            --data-urlencode "JENKINS_SLAVE_LABEL=oc417")

          echo "Full response:"
          echo "$RESPONSE"

          echo "Extracting queue location..."
          QUEUE_URL=$(echo "$RESPONSE" | grep -i Location | awk '{print $2}' | tr -d '\r')

          echo "Queue URL: $QUEUE_URL"

          if [ -z "$QUEUE_URL" ]; then
            echo "❌ Failed to trigger Jenkins job"
            exit 1
          else
            echo "✅ Jenkins job triggered successfully"
          fi